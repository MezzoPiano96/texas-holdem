function buildSetupUI(){
  const countPicker=document.getElementById('countPicker');
  for(let n=2;n<=9;n++){
    const b=document.createElement('div');
    b.className='pill'+(n===chosenCount?' active':'');
    b.textContent=n+' 人';
    b.onclick=()=>{ chosenCount=n; chosenSeats=[]; buildSeatPicker(); refreshCountUI(); };
    countPicker.appendChild(b);
  }
  buildSeatPicker();

  const stackPicker=document.getElementById('stackPicker');
  const presets=[
    {label:'1000 / 5-10', stack:1000, sb:5, bb:10},
    {label:'2000 / 10-20', stack:2000, sb:10, bb:20},
    {label:'5000 / 25-50', stack:5000, sb:25, bb:50},
  ];
  presets.forEach((pre,i)=>{
    const b=document.createElement('div');
    b.className='pill'+(i===0?' active':'');
    b.textContent=pre.label;
    b.onclick=()=>{
      chosenStack=pre.stack; chosenSB=pre.sb; chosenBB=pre.bb;
      [...stackPicker.children].forEach(c=>c.classList.remove('active'));
      b.classList.add('active');
    };
    stackPicker.appendChild(b);
  });

  function nameWeight(str){
    let w=0;
    for(const ch of str) w += /[\u0020-\u00ff]/.test(ch) ? 1 : 2;
    return w;
  }
  [document.getElementById('nameInput1'), document.getElementById('nameInput2')].forEach(input=>{
    input.addEventListener('input', ()=>{
      let v=input.value;
      while(nameWeight(v)>16) v=v.slice(0,-1);
      if(v!==input.value) input.value=v;
    });
  });

  // 性别选择
  document.getElementById('genderMaleBtn').onclick=()=>{
    playerGender='m';
    document.getElementById('genderMaleBtn').classList.add('active');
    document.getElementById('genderFemaleBtn').classList.remove('active');
  };
  document.getElementById('genderFemaleBtn').onclick=()=>{
    playerGender='f';
    document.getElementById('genderFemaleBtn').classList.add('active');
    document.getElementById('genderMaleBtn').classList.remove('active');
  };

  // 速度选择
  const spEl=document.getElementById('speedPicker');
  SPEED_PRESETS.forEach((s,i)=>{
    const b=document.createElement('div');
    b.className='pill'+(i===1?' active':'');
    b.textContent=speedLabel(i);
    b.onclick=()=>{
      gameSpeed=s;
      if(s.noVoice && !VOICE.isMuted()) VOICE.toggleMute(); // 极速自动关语音
      [...spEl.children].forEach(c=>c.classList.remove('active'));
      b.classList.add('active');
    };
    spEl.appendChild(b);
  });

  // AI难度选择
  const DIFFICULTIES=[['beginner','aiBeginner'],['normal','aiNormal'],['hell','aiHell']];
  const diffEl=document.getElementById('difficultyPicker');
  DIFFICULTIES.forEach(([value,key])=>{
    const b=document.createElement('div');
    b.className='pill'+(value===aiDifficulty?' active':'');
    b.textContent=T(key);
    b.dataset.diffKey=key;
    b.onclick=()=>{
      aiDifficulty=value;
      const sel=document.getElementById('settingAiDifficulty'); if(sel) sel.value=value;
      [...diffEl.children].forEach(c=>c.classList.remove('active'));
      b.classList.add('active');
    };
    diffEl.appendChild(b);
  });
}
function refreshCountUI(){
  [...document.getElementById('countPicker').children].forEach((c,i)=>c.classList.toggle('active', i+2===chosenCount));
}
function buildSeatPicker(){
  const seatPicker=document.getElementById('seatPicker');
  seatPicker.innerHTML='';
  for(let i=0;i<chosenCount;i++){
    const b=document.createElement('div');
    b.className='pill'+(chosenSeats.includes(i)?' active':'');
    b.textContent='座位 '+(i+1);
    b.onclick=()=>{
      if(chosenSeats.includes(i)){
        chosenSeats=chosenSeats.filter(x=>x!==i);
      } else if(chosenSeats.length<2){
        chosenSeats.push(i);
      }
      buildSeatPicker();
      updateSeatHint();
    };
    seatPicker.appendChild(b);
  }
  updateSeatHint();
}
function updateSeatHint(){
  const hint=document.getElementById('seatHint');
  if(chosenSeats.length===0) hint.textContent = '已选 0 个，请选择 1-2 个座位';
  else if(chosenSeats.length===1) hint.textContent = '已选 1 个座位 · 单人模式';
  else hint.textContent = '已选 2 个座位 · 将开启同屏轮流隐私模式（双方互不偷看手牌）';
  document.getElementById('startBtn').disabled = !(chosenSeats.length>=1 && chosenSeats.length<=2);
}

document.getElementById('startBtn').onclick = ()=>{ SFX.click(); startGame(); };

function startGame(){
  const customNames=[
    document.getElementById('nameInput1').value.trim(),
    document.getElementById('nameInput2').value.trim(),
  ];
  const names=[];
  let aiPoolIdx=0;
  for(let i=0;i<chosenCount;i++){
    if(chosenSeats.includes(i)){
      const orderIdx=chosenSeats.indexOf(i);
      names.push(customNames[orderIdx] || ('玩家'+(orderIdx+1)));
    } else {
      names.push(AI_NAME_POOL[aiPoolIdx % AI_NAME_POOL.length]); aiPoolIdx++;
    }
  }
  privacyMode = chosenSeats.length===2;
  actingSeatId = -1;
  game = new PokerGame(names, chosenStack, chosenSB, chosenBB, chosenSeats, decideFn, onGameUpdate);
  game.players.forEach(p=>{ if(!p.isHuman) p.aggression = 0.75 + Math.random()*0.6; });
  VOICE.preload&&VOICE.preload();
  gameStartTime=Date.now();
  pausedAccumMs=0; pauseStartedAt=null;
  if(gameTimerInterval) clearInterval(gameTimerInterval);
  gameTimerInterval=setInterval(()=>{
    const el=document.getElementById('gameTimer');
    if(el&&gameStartTime){
      const pausedNow = pauseStartedAt ? (Date.now()-pauseStartedAt) : 0;
      const s=Math.floor((Date.now()-gameStartTime-pausedAccumMs-pausedNow)/1000);
      const mm=String(Math.floor(s/60)).padStart(2,'0'); const ss=String(s%60).padStart(2,'0');
      el.textContent='⏱ '+mm+':'+ss;
    }
  },1000);

  document.getElementById('setup').style.display='none';
  document.getElementById('game').style.display='block';
  runHand();
}

function genderForPlayer(p){
  if(!p.isHuman) return genderForAI(p.name);
  return playerGender;
}
function formatAction(type, amount){
  if(!type) return '';
  if(type==='fold') return T('fold');
  if(type==='check') return T('check');
  if(type==='call') return T('call')+' '+amount;
  if(type==='raise') return T('raise')+' '+amount;
  if(type==='allin') return T('allin')+' '+amount;
  return '';
}
function cardText(c){
  const rl=RANK_LABEL[c.r]||c.r, sym=SUIT_SYMBOL[c.s], red=(c.s==='h'||c.s==='d');
  return `<span class="log-card-sym${red?' red':''}">${rl}${sym}</span>`;
}
function roleBadgeIcon(role){
  if(role==='sb') return '<span class="log-role sb">S</span>';
  if(role==='bb') return '<span class="log-role bb">B</span>';
  return '';
}
// 把结构化的 log 条目按当前语言格式化成最终 HTML —— 渲染时才翻译，
// 所以切换语言会让已经记录下来的历史条目也跟着重新翻译
function formatLogEntry(e){
  if(e.type==='hand') return `${handLabel(e.handCount)} · ${T('dealerWord')} ${e.dealerName}`;
  if(e.type==='blind'){
    const verb = e.role==='sb' ? T('postSmallBlind') : T('postBigBlind');
    return `${roleBadgeIcon(e.role)}<span class="log-name">${e.name}</span> ${verb} ${e.amount}${paren(T('pot')+' '+e.pot)}`;
  }
  if(e.type==='street'){
    if(e.stage==='flop') return `${T('stage_flop')} ${e.cards.map(cardText).join(' ')}`;
    if(e.stage==='turn') return `${T('stage_turn')} ${e.priorCards.map(cardText).join(' ')} <b>${cardText(e.newCard)}</b>`;
    if(e.stage==='river') return `${T('stage_river')} ${e.priorCards.map(cardText).join(' ')} <b>${cardText(e.newCard)}</b>`;
    if(e.stage==='showdown') return `${T('stage_showdown')} ${e.cards.map(cardText).join(' ')}`;
  }
  if(e.type==='action'){
    const la=formatAction(e.actionType, e.amount);
    return `${roleBadgeIcon(e.role)}<span class="log-name">${e.name}</span> ${la}${paren(T('pot')+' '+e.pot)}`;
  }
  if(e.type==='winFold') return `🏆 <span class="log-name">${e.winnerName}</span> ${T('pot_won')} ${e.amount}${T('all_others_fold')}`;
  if(e.type==='winShowdown'){
    const names=e.winnerNames.map(n=>`<span class="log-name">${n}</span>`).join(currentLang==='zh-CN'?'、':', ');
    return `🏆 ${T('wonPot')} ${e.potAmount} ${T('wonBy')} ${names} ${T('wonSuffix')}${paren(handNameI18n(e.handTypeIdx))}`;
  }
  if(e.type==='gameOver') return e.winnerName ? `🏁 ${winsAllChipsText(e.winnerName)}` : `🏁 ${T('gameOver')}`;
  return '';
}
function logPushStyled(entry){
  game.log.push(entry);
  renderLog();
}
function onGameUpdate(type, payload){
  if(type==='render'){ renderAll(); }
  else if(type==='acting'){
    actingSeatId=payload;
    renderAll();
    if(payload>=0 && game.players[payload].isHuman) {
      if(!gamePaused) VOICE.speak('your_turn', genderForPlayer(game.players[payload]), game.players[payload].name);
    }
  }
  else if(type==='newhand'){ const hp=game.players.find(p=>p.isHuman)||game.players[0]; VOICE.speak('new_hand',genderForPlayer(hp),hp.name); }
  else if(type==='deal'){
    SFX.deal();
    const s=game.stage;
    if(s==='preflop'){ /* new_hand moved to playHand */ }
    else if(s==='flop'){ VOICE.speak('flop', genderForPlayer(game.players.find(p=>p.isHuman)||game.players[0]), (game.players.find(p=>p.isHuman)||game.players[0]).name); }
    else if(s==='turn'){ VOICE.speak('turn_card', genderForPlayer(game.players.find(p=>p.isHuman)||game.players[0]), (game.players.find(p=>p.isHuman)||game.players[0]).name); }
    else if(s==='river'){ VOICE.speak('river', genderForPlayer(game.players.find(p=>p.isHuman)||game.players[0]), (game.players.find(p=>p.isHuman)||game.players[0]).name); }
  }
  else if(type==='win'){
    const winnerIds=payload||[];
    const humanWon = game.players.some(p=>p.isHuman && winnerIds.includes(p.id));
    if(humanWon){ SFX.win(); VOICE.speak('winner', genderForPlayer(game.players[winnerIds[0]]), game.players[winnerIds[0]].name); }
    else{ SFX.lose(); }
  }
  else if(type==='action'){
    const p=payload;
    const actionType=p.lastActionType;
    if(actionType==='fold'){ SFX.fold(); VOICE.speak(actionType, genderForPlayer(p), p.name); }
    else if(actionType==='check'){ SFX.check(); VOICE.speak(actionType, genderForPlayer(p), p.name); }
    else if(actionType==='call'){ SFX.chip(); VOICE.speak(actionType, genderForPlayer(p), p.name); animateChipPush(p); }
    else if(actionType==='raise'||actionType==='allin'){ SFX.raise(); VOICE.speak(actionType, genderForPlayer(p), p.name); animateChipPush(p); }
    // 给日志加行动标记，附带当前底池
    if(actionType){
      logPushStyled({type:'action', cls:'entry-action', role:game.roleOf(p.id), name:p.name, actionType:p.lastActionType, amount:p.lastActionAmount, pot:game.totalPot()});
    }
  }
}

async function runHand(){
  document.getElementById('nextHandBar').classList.remove('show');
  document.getElementById('privacyGate').classList.remove('show');
  actingSeatId=-1;
  const res = await game.playHand();
  renderAll();
  document.getElementById('actionPanel').classList.remove('show');
  if(res.gameOver){
    const winner=game.players.find(p=>p.stack>0);
    game.pushLog({type:'gameOver', cls:'entry-win', winnerName: winner?winner.name:null});
    renderLog();
    document.getElementById('nextHandBar').innerHTML = `<div style="color:var(--gold-bright);margin-bottom:10px;">${T('gameOver')}</div><button onclick="location.reload()">${T('backToSetup')}</button>`;
    document.getElementById('nextHandBar').classList.add('show');
    return;
  }
  document.getElementById('nextHandBar').innerHTML = `<button id="nextHandBtn">${T('nextHand')}</button>`;
  document.getElementById('nextHandBar').classList.add('show');
  document.getElementById('nextHandBtn').onclick = ()=>{ SFX.click(); runHand(); };
}

let gamePaused=false;
function togglePause(){
  gamePaused=!gamePaused;
  document.getElementById('pauseBtn').textContent = gamePaused ? T('resume') : T('pause');

    pauseStartedAt=Date.now();

}
